<div
  class="min-h-screen flex items-center justify-center bg-background p-4 relative transition-colors duration-300"
>
  <div class="absolute top-4 right-4">
    <app-theme-switcher></app-theme-switcher>
  </div>

  <div
    class="max-w-md w-full bg-surface rounded-xl shadow-lg p-8 space-y-6 transition-colors duration-300"
  >
    <div class="text-center">
      <h2 class="text-2xl font-bold text-text-main">Support Center Login</h2>
      <p class="text-sm text-text-muted mt-2">Enter your credentials to access your dashboard</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div class="my-3">
        <app-ui-input
          id="email"
          label="Email Address"
          type="email"
          placeholder="test@adrenalin.com"
          [control]="$any(loginForm.get('email'))"
        ></app-ui-input>
      </div>
      <div class="my-3">
        <app-ui-input
          id="password"
          label="Password"
          type="password"
          placeholder="••••••••"
          [control]="$any(loginForm.get('password'))"
        ></app-ui-input>
      </div>
      <div class="my-3">
        <app-ui-button type="submit" [disabled]="isLoading() || loginForm.invalid">
          @if (isLoading()) {
            <svg
              class="animate-spin h-5 w-5 text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          } @else {
            <span>LOGIN</span>
          }
        </app-ui-button>
      </div>
    </form>
    <div class="text-center mt-6">
      <p class="text-sm text-text-muted">
        Don't have an account?
        <a
          routerLink="/signup"
          class="text-primary hover:text-primary-hover font-semibold transition-colors"
        >
          Sign up here
        </a>
      </p>
    </div>
  </div>
</div>
