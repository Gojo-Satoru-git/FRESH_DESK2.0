<!-- ================= HEADER ================= -->
<header class="flex items-center justify-between px-4 sm:px-8 md:px-12 lg:px-16 py-4">

  <img
    src="log.png"
    alt="Customer Portal Logo"
    class="object-contain h-32 w-32 sm:h-40 sm:w-40 md:h-48 md:w-48 lg:h-64 lg:w-64 -mt-6 sm:-mt-8 md:-mt-10 lg:-mt-14"
  />

  <div class="flex items-center gap-4 relative">

    <button class="h-10 w-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center  -mt-6 sm:-mt-8 md:-mt-10 lg:-mt-20">
      <img src="notification.png" class="h-5 w-5" />
    </button>

    <button
      (click)="toggleMenu()"
      class="h-14 w-14 rounded-full bg-[#012A4A] text-white font-semibold text-lg  -mt-6 sm:-mt-8 md:-mt-10 lg:-mt-20"
    >
      A
    </button>

    @if (isMenuOpen()) {
      <div class="absolute right-0 top-2 w-44 bg-white rounded-lg shadow-lg border z-50">
        <button
          class="w-full px-4 py-2 flex gap-3 hover:bg-gray-100"
          (click)="goToProfile()"
        >
          <img src="profile.png" class="h-6 w-6" />
          <span class="font-bold">My Profile</span>
        </button>

        <button
          class="w-full px-4 py-2 flex gap-3 text-red-600 hover:bg-gray-100"
          (click)="logout()"
        >
          <img src="logout.png" class="h-6 w-6" />
          <span class="font-bold">Logout</span>
        </button>
      </div>
    }
  </div>
</header>

<!-- ================= PAGE ================= -->
<div class="min-h-screen bg-slate-50 ">
  <div class="max-w-5xl mx-auto ">

    <h1 class="text-4xl font-semibold  leading-tight mb-2 ">Raise a new ticket</h1>
    <p class="text-2xl text-gray-500 mb-6">
      Describe your issue and our team will respond shortly.
    </p>

    <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()" class="bg-white p-10 rounded-xl  shadow-2xl">

      <label class="block text-2xl  font-bold mb-2">
        Subject <span class="text-red-400 ">*</span>
        </label>
      <input
        formControlName="subject"
        placeholder="Brief Summary of the issue"
        class="w-full px-3 text-xl  h-12 shadow-2xl border-gray-800 rounded-lg mb-4"
      />

      <label class="block text-2xl font-bold mb-2">Module <span class="text-red-400">*</span></label>
      <select formControlName="module" class="w-full px-3 h-12 text-xl  shadow-2xl border-gray-200 rounded-lg mb-4">
        <option value="" disabled>Select module</option>
        <option *ngFor="let m of modules">{{ m }}</option>
        
      </select>

      <label class="block text-2xl font-bold mb-2 ">Description <span class="text-red-400">*</span></label>
      <textarea
        rows="6"
        formControlName="description"
        placeholder="Provide detail of the issue"
        class="w-full px-3 py-3 text-xl h-60 shadow-2xl border-gray-200 rounded-xl mb-6"
      ></textarea>

     
      <!-- ========== ATTACHMENTS ========== -->
<label class="block text-2xl font-bold mb-2">
  Attachments
</label>

<div
  class="w-full mb-6 p-6 border-2 border-dashed rounded-xl
         cursor-pointer transition
         bg-slate-50 hover:bg-slate-100
         flex flex-col items-center justify-center gap-2"
  [class.border-blue-400]="isDragOver"
  [class.bg-blue-50]="isDragOver"
  (dragover)="isDragOver = true"
  (dragleave)="isDragOver = false"
  (drop)="onFileDrop($event)"
>
  <input
    type="file"
    multiple
    hidden
    #fileInput
    (change)="onFileSelect($event)"
  />
  <img
        src="upload.png"
        alt="Customer Portal Logo"
        class="
          object-contain
          h-10 w-10
        
        "
      />
  <p class="text-xl text-gray-600">
    Drag & drop files here or
    <span
      class="text-blue-600 font-bold underline"
      (click)="fileInput.click()"
    >
      browse
    </span>
  </p>

  <p class="text-sm text-gray-400 mt-1">
    Supported: PDF, PNG, JPG, DOCX
  </p>
</div>

<!-- Selected Files -->
<div *ngIf="attachedFiles.length > 0" class="mb-6">
  <p class="text-xl font-bold mb-2">Attached Files</p>

  <ul class="space-y-2">
    <li
      *ngFor="let file of attachedFiles; let i = index"
      class="flex justify-between items-center bg-slate-100 px-4 py-2 rounded-lg"
    >
      <span class="text-lg truncate">{{ file.name }}</span>
      <button
        type="button"
        class="text-red-600 font-bold"
        (click)="removeFile(i)"
      >
        ✕
      </button>
    </li>
  </ul>
</div>
  <div class="flex justify-end gap-3">
        <button type="button" (click)="onCancel()" class="px-5 py-2 text-xl text-white font-bold bg-gray-400 focus:outline-none
    focus:bg-gray-600 border-gray-100 rounded-xl">
          Cancel
        </button>
        <button type="submit" class="px-5 py-2 text-xl font-bold bg-blue-500 text-white focus:outline-none
    focus:bg-blue-600  rounded-xl">
          Submit
        </button>
      </div>
   
    </form>

  </div>
</div>
